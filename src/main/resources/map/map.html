<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Carte Tunisie — Parcelles</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a2332; color: #e0e0e0; }

        #app { display: flex; height: 100vh; width: 100vw; }

        /* ── SIDEBAR ── */
        #sidebar {
            width: 290px; min-width: 290px;
            background: linear-gradient(180deg, #0f1923 0%, #0d1f0d 100%);
            border-right: 2px solid #2e7d32;
            display: flex; flex-direction: column; overflow: hidden;
            z-index: 1000;
            box-shadow: 4px 0 20px rgba(0,0,0,0.6);
        }
        #sidebar-header {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            padding: 16px 14px;
            border-bottom: 1px solid #4CAF50;
            flex-shrink: 0;
        }
        #sidebar-header h2 { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        #sidebar-header p  { font-size: 11px; color: #a5d6a7; margin-top: 3px; }

        #gov-info {
            padding: 12px 14px; border-bottom: 1px solid #1a2d1a;
            min-height: 60px; display: flex; align-items: center;
            background: rgba(46,125,50,0.08); flex-shrink: 0;
        }
        #gov-info.empty { color: #558b5e; font-size: 12px; font-style: italic; }
        #gov-info .gov-name { font-size: 16px; font-weight: 700; color: #66bb6a; line-height: 1.2; }
        #gov-info .gov-sub  { font-size: 11px; color: #81c784; margin-top: 3px; }

        #parcelles-section { flex: 1; overflow-y: auto; padding: 8px; }
        #parcelles-section::-webkit-scrollbar { width: 4px; }
        #parcelles-section::-webkit-scrollbar-track { background: #0a0f0a; }
        #parcelles-section::-webkit-scrollbar-thumb { background: #2e7d32; border-radius: 2px; }

        #parcelles-list { display: flex; flex-direction: column; gap: 7px; }

        .parcelle-card {
            background: linear-gradient(135deg, #192919, #213221);
            border: 1px solid #2a4d2a; border-radius: 9px;
            padding: 11px 12px; cursor: pointer;
            transition: all 0.18s ease; position: relative; overflow: hidden;
        }
        .parcelle-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #4CAF50, #81c784);
            border-radius: 9px 9px 0 0;
        }
        .parcelle-card.occupee::before { background: linear-gradient(90deg, #ef5350, #ef9a9a); }
        .parcelle-card:hover {
            background: linear-gradient(135deg, #223522, #2d3f2d);
            border-color: #4CAF50; transform: translateX(3px);
            box-shadow: 0 4px 14px rgba(76,175,80,0.2);
        }
        .card-name  { font-size: 13px; font-weight: 700; color: #e8f5e9; margin-bottom: 5px; }
        .card-row   { display: flex; justify-content: space-between; font-size: 11px; color: #81c784; margin-top: 3px; }
        .card-row span:last-child { color: #a5d6a7; }
        .badge {
            display: inline-block; font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 10px; margin-top: 6px;
        }
        .badge.libre   { background: rgba(76,175,80,0.2); color: #69f0ae; border: 1px solid #4CAF50; }
        .badge.occupee { background: rgba(239,83,80,0.15); color: #ff8a80; border: 1px solid #ef5350; }

        .no-parcelles { text-align: center; color: #3d5c3d; font-size: 12px; padding: 30px 8px; font-style: italic; }
        .no-parcelles .icon { font-size: 28px; display: block; margin-bottom: 8px; }

        /* stats bar */
        #stats-bar {
            background: rgba(0,0,0,0.45); border-top: 1px solid #1a2d1a;
            padding: 9px 14px; display: flex; justify-content: space-between;
            font-size: 11px; color: #81c784; flex-shrink: 0;
        }
        .stat-item { text-align: center; }
        .stat-num  { font-size: 15px; font-weight: 700; color: #4CAF50; display: block; }

        /* ── MAP ── */
        #map { flex: 1; height: 100vh; }

        /* tooltip */
        .gov-tooltip {
            background: rgba(10,20,10,0.96) !important;
            border: 1px solid #4CAF50 !important;
            border-radius: 7px !important;
            color: #e8f5e9 !important;
            font-size: 12px !important; font-weight: 600 !important;
            padding: 5px 11px !important;
            box-shadow: 0 4px 18px rgba(0,0,0,0.55) !important;
            white-space: nowrap;
        }
        .gov-tooltip::before { display: none !important; }

        /* legend */
        .map-legend {
            background: rgba(10,20,10,0.92); border: 1px solid #2e7d32;
            border-radius: 8px; padding: 9px 12px; font-size: 11px; color: #81c784;
        }
        .map-legend h4 { color: #e8f5e9; font-size: 11px; margin-bottom: 7px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .legend-item   { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
        .legend-dot    { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

        /* loading */
        #loading {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #1a2332; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s;
        }
        #loading h3 { color: #4CAF50; margin-top: 14px; font-size: 13px; }
        #loading p  { color: #558b5e; font-size: 11px; margin-top: 4px; }
        .spinner {
            width: 38px; height: 38px; border: 3px solid #1a3020;
            border-top-color: #4CAF50; border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <h3>Chargement de la carte...</h3>
    <p>Gouvernorats de Tunisie</p>
</div>

<div id="app">
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>🌍 Parcelles par Gouvernorat</h2>
            <p>Survolez un gouvernorat sur la carte</p>
        </div>
        <div id="gov-info" class="empty">
            <span>← Passez la souris sur un gouvernorat</span>
        </div>
        <div id="parcelles-section">
            <div id="parcelles-list">
                <div class="no-parcelles">
                    <span class="icon">🗺️</span>
                    Sélectionnez un gouvernorat pour voir ses parcelles
                </div>
            </div>
        </div>
        <div id="stats-bar">
            <div class="stat-item"><span class="stat-num" id="stat-total">0</span>Total</div>
            <div class="stat-item"><span class="stat-num" id="stat-libres" style="color:#69f0ae">0</span>Libres</div>
            <div class="stat-item"><span class="stat-num" id="stat-occupees" style="color:#ff8a80">0</span>Occupées</div>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
    // ═══════════════════════════════════════════════════════
    //  DATA
    // ═══════════════════════════════════════════════════════
    var allParcelles = [];
    var currentGov   = null;
    var geojsonLayer = null;
    var focusParcelle = null; // set by Java to zoom into a specific parcelle

    // called by Java
    function setParcelles(jsonStr) {
        try { allParcelles = JSON.parse(jsonStr); } catch(e) { allParcelles = []; }
        updateGlobalStats();
        if (geojsonLayer) refreshStyles();
        if (currentGov) showParcelles(currentGov);
    }

    // called by Java to zoom to a single parcelle's governorate
    function focusOnParcelle(govName, parcelleName) {
        focusParcelle = parcelleName;
        // highlight that gov on the map
        if (geojsonLayer) {
            geojsonLayer.eachLayer(function(layer) {
                if (layer.feature.properties.name === govName) {
                    map.fitBounds(layer.getBounds(), { padding: [40, 40] });
                    layer.setStyle(getHoverStyle(layer.feature));
                }
            });
        }
        showParcelles(govName);
    }

    function updateGlobalStats() {
        document.getElementById('stat-total').textContent    = allParcelles.length;
        document.getElementById('stat-libres').textContent   = allParcelles.filter(function(p){ return p.statut && p.statut.toLowerCase().includes('libre'); }).length;
        document.getElementById('stat-occupees').textContent = allParcelles.filter(function(p){ return p.statut && !p.statut.toLowerCase().includes('libre'); }).length;
    }

    // ── Governorate aliases for matching ──
    var GOV_ALIASES = {
        "Tunis":       ["tunis"],
        "Ariana":      ["ariana"],
        "Ben Arous":   ["ben arous","ben-arous","benarous"],
        "Manouba":     ["manouba","la manouba"],
        "Nabeul":      ["nabeul","cap bon","hammamet","kelibia"],
        "Zaghouan":    ["zaghouan"],
        "Bizerte":     ["bizerte"],
        "Béja":        ["béja","beja"],
        "Jendouba":    ["jendouba"],
        "Le Kef":      ["kef","le kef"],
        "Siliana":     ["siliana"],
        "Sousse":      ["sousse"],
        "Monastir":    ["monastir"],
        "Mahdia":      ["mahdia"],
        "Sfax":        ["sfax"],
        "Kairouan":    ["kairouan"],
        "Kasserine":   ["kasserine","kassérine"],
        "Sidi Bouzid": ["sidi bouzid","sidi-bouzid","sidi bou zid"],
        "Gabès":       ["gabès","gabes"],
        "Médenine":    ["médenine","medenine"],
        "Tataouine":   ["tataouine"],
        "Gafsa":       ["gafsa"],
        "Tozeur":      ["tozeur"],
        "Kébili":      ["kébili","kebili"]
    };

    function getParcellsForGov(govName) {
        var aliases = GOV_ALIASES[govName] || [govName.toLowerCase()];
        return allParcelles.filter(function(p) {
            if (!p.localisation) return false;
            var loc = p.localisation.toLowerCase();
            return aliases.some(function(a) { return loc.includes(a); });
        });
    }

    function showParcelles(govName) {
        currentGov = govName;
        var parcelles = getParcellsForGov(govName);
        var count = parcelles.length;

        var govInfo = document.getElementById('gov-info');
        govInfo.classList.remove('empty');
        govInfo.innerHTML =
            '<div><div class="gov-name">📍 ' + govName + '</div>' +
            '<div class="gov-sub">' + count + ' parcelle' + (count!==1?'s':'') + ' trouvée' + (count!==1?'s':'') + '</div></div>';

        var list = document.getElementById('parcelles-list');
        if (count === 0) {
            list.innerHTML = '<div class="no-parcelles"><span class="icon">🌿</span>Aucune parcelle dans ce gouvernorat</div>';
            focusParcelle = null;
            return;
        }

        list.innerHTML = parcelles.map(function(p) {
            var isLibre    = p.statut && p.statut.toLowerCase().includes('libre');
            var badgeClass = isLibre ? 'libre' : 'occupee';
            var cardClass  = isLibre ? '' : 'occupee';
            var isTarget   = focusParcelle && p.nom === focusParcelle;
            var highlight  = isTarget ? 'style="border-color:#FFD700;box-shadow:0 0 12px rgba(255,215,0,0.4);"' : '';
            return (
                '<div class="parcelle-card ' + cardClass + '" ' + highlight + '>' +
                '<div class="card-name">' + (isTarget ? '⭐ ' : '🌾 ') + (p.nom||'Sans nom') + '</div>' +
                '<div class="card-row"><span>📏 Surface</span><span>' + (p.surface||'N/A') + ' m²</span></div>' +
                (p.typeSol ? '<div class="card-row"><span>🏔 Sol</span><span>' + p.typeSol + '</span></div>' : '') +
                '<span class="badge ' + badgeClass + '">' + (p.statut||'—') + '</span>' +
                '</div>'
            );
        }).join('');

        // scroll to highlighted card
        if (focusParcelle) {
            setTimeout(function() {
                var cards = document.querySelectorAll('.parcelle-card');
                parcelles.forEach(function(p, i) {
                    if (p.nom === focusParcelle && cards[i]) {
                        cards[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
                focusParcelle = null;
            }, 100);
        }
    }

    // ═══════════════════════════════════════════════════════
    //  STYLES
    // ═══════════════════════════════════════════════════════
    function getBaseStyle(feature) {
        var count = getParcellsForGov(feature.properties.name).length;
        return {
            fillColor:   count > 0 ? '#1e6b22' : '#0d2d0d',
            weight:      1.5,
            opacity:     1,
            color:       '#4CAF50',
            fillOpacity: count > 0 ? 0.55 : 0.30,
            dashArray:   count > 0 ? '' : '5'
        };
    }

    function getHoverStyle(feature) {
        var count = getParcellsForGov(feature.properties.name).length;
        return {
            fillColor:   count > 0 ? '#5cb860' : '#2a4a2a',
            weight:      2.5,
            color:       '#a5d6a7',
            fillOpacity: 0.78
        };
    }

    // ═══════════════════════════════════════════════════════
    //  BUILD GEOJSON LAYER
    // ═══════════════════════════════════════════════════════
    function onEachFeature(feature, layer) {
        var govName = feature.properties.name;

        layer.on({
            mouseover: function(e) {
                e.target.setStyle(getHoverStyle(feature));
                e.target.bringToFront();
                showParcelles(govName);
            },
            mouseout: function(e) {
                geojsonLayer.resetStyle(e.target);
            },
            click: function(e) {
                map.fitBounds(e.target.getBounds(), { padding: [30, 30] });
                showParcelles(govName);
            }
        });

        var count   = getParcellsForGov(govName).length;
        var tipText = '<b>' + govName + '</b>' + (count > 0 ? '<br>' + count + ' parcelle' + (count!==1?'s':'') : '');
        layer.bindTooltip(tipText, { className: 'gov-tooltip', sticky: true, offset: [10, 0] });
    }

    function initGeoJSON() {
        geojsonLayer = L.geoJSON(TUNISIA_GOVS, {
            style: getBaseStyle,
            onEachFeature: onEachFeature
        }).addTo(map);
        map.fitBounds(geojsonLayer.getBounds(), { padding: [10, 10] });
    }

    function refreshStyles() {
        if (!geojsonLayer) return;
        geojsonLayer.eachLayer(function(layer) {
            geojsonLayer.resetStyle(layer);
            var govName = layer.feature.properties.name;
            var count   = getParcellsForGov(govName).length;
            var tipText = '<b>' + govName + '</b>' + (count > 0 ? '<br>' + count + ' parcelle' + (count!==1?'s':'') : '');
            layer.bindTooltip(tipText, { className: 'gov-tooltip', sticky: true, offset: [10, 0] });
        });
    }

    // ═══════════════════════════════════════════════════════
    //  LEGEND
    // ═══════════════════════════════════════════════════════
    function addLegend() {
        var legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function() {
            var div = L.DomUtil.create('div', 'map-legend');
            div.innerHTML =
                '<h4>Légende</h4>' +
                '<div class="legend-item"><div class="legend-dot" style="background:#1e6b22;border:1px solid #4CAF50"></div>Avec parcelles</div>' +
                '<div class="legend-item"><div class="legend-dot" style="background:#0d2d0d;border:1px dashed #4CAF50"></div>Sans parcelles</div>' +
                '<div class="legend-item"><div class="legend-dot" style="background:#5cb860"></div>Survolé</div>';
            return div;
        };
        legend.addTo(map);
    }

    // ═══════════════════════════════════════════════════════
    //  BOOT
    // ═══════════════════════════════════════════════════════
    window.addEventListener('load', function() {
        setTimeout(function() {
            initGeoJSON();
            addLegend();
            var loading = document.getElementById('loading');
            loading.style.opacity = '0';
            setTimeout(function() { loading.style.display = 'none'; }, 400);
        }, 200);
    });
</script>
</body>
</html>
